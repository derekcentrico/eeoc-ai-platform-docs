# clean-repo-map.conf — Maps working repos to their agency export directories.
#
# Format: working-dir-name  clean-dir-name  agency-remote-url
# Lines starting with # are comments.  "pending" means the agency repo
# has not been created yet on the EEOC GitHub org.
#
# Working repos live under:  ~/ai-platform/workspace/eeoc-workspace/
# Clean repos live under:    ~/ai-platform/workspace/eeoc-agency-export/

eeoc-ofs-adr                        ADR_PORTAL                  https://github.com/EEOC/ADR_PORTAL.git
eeoc-ofs-triage                     OFS_TRIAGE                  pending
eeoc-ogc-trialtool                  OGC_TRIALTOOL               pending
eeoc-data-analytics-and-dashboard   DATA_ANALYTICS              pending
eeoc-arc-integration-api            ARC_INTEGRATION             pending
eeoc-mcp-hub-functions              MCP_HUB                     pending
eeoc-ochco-benefits-validation      OCHCO_BENEFITS              pending
